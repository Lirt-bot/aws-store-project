<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="SE">

<head>
    <title th:text="${product.title}">Produkt</title>
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>


<h1 th:text="${product.title}"></h1>

<img th:src="${product.image}" width="200"/>

<p th:text="${product.price} + ' kr'"></p>

<p th:text="${product.category}"></p>

<p th:text="${product.description}"></p>

<form th:action="@{/orders/create}" method="post">

    <input type="hidden" name="productId" th:value="${product.id}"/>

    <label>Antal</label>
    <input type="number" name="quantity" min="1" value="1"/>

    <button type="submit">Beställ</button>
</form>
</body>
</html>
