<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="se">
<!--/*@thymesVar id="items" type="java.util.List"*/-->
<head>
    <title>Kundvagn</title>
</head>
<body>

<div th:replace="~{navbar :: navbar}"></div>

<h1>Din kundvagn</h1>

<div th:if="${#lists.isEmpty(items)}">
    <p>Din kundvagn är tom.</p>
    <a href="/products">Fortsätt handla</a>
</div>

<div th:if="${!#lists.isEmpty(items)}">
    <div th:each="item : ${items}">
        <hr/>
        <img th:src="${item.image}" width="100"/>
        <h3 th:text="${item.title}"></h3>
        <p th:text="${item.price} + ' $'"></p>

        <form th:action="@{/cart/remove/{id}(id=${item.id})}" method="post">
            <button type="submit">Ta bort</button>
        </form>
    </div>

    <hr/>
    <h3 th:text="'Totalt: ' + ${total} + ' $'"></h3>

    <form th:action="@{/cart/checkout}" method="post">
        <button type="submit">Beställ allt</button>
    </form>
</div>

</body>
</html>
